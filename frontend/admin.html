<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Support Triage</title>
    <meta name="description" content="Admin dashboard for managing AI-triaged support tickets">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            <span>SupportAI Admin</span>
        </div>
        <div class="nav-links">
            <button class="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode"></button>
            <a href="/" class="neu-btn" style="padding:8px 18px;font-size:13px;">💬 Chat</a>
            <a href="/admin" class="neu-btn primary" style="padding:8px 18px;font-size:13px;">⚙️ Admin</a>
            <button class="neu-btn danger" onclick="logout()" style="padding:8px 18px;font-size:13px;">Logout</button>
        </div>
    </nav>

    <div class="dashboard">

        <!-- Stats Row -->
        <div class="stats-grid" id="statsGrid">
            <div class="neu-card stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Tickets</div>
            </div>
            <div class="neu-card stat-card">
                <div class="stat-value" id="statAI">0</div>
                <div class="stat-label">AI Answered</div>
            </div>
            <div class="neu-card stat-card">
                <div class="stat-value" id="statPending" style="-webkit-text-fill-color:var(--warning);">0</div>
                <div class="stat-label">Pending Admin</div>
            </div>
            <div class="neu-card stat-card">
                <div class="stat-value" id="statAdmin" style="-webkit-text-fill-color:var(--success);">0</div>
                <div class="stat-label">Admin Answered</div>
            </div>
            <div class="neu-card stat-card">
                <div class="stat-value" id="statKB">0</div>
                <div class="stat-label">KB Articles</div>
            </div>
        </div>

        <!-- Detailed Stats -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:24px;">
            <div class="neu-card" style="padding:20px;">
                <h3 style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px;">📊 Queue Breakdown
                </h3>
                <div id="queueStats"></div>
            </div>
            <div class="neu-card" style="padding:20px;">
                <h3 style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:12px;">📊 Priority
                    Breakdown</h3>
                <div id="priorityStats"></div>
            </div>
        </div>

        <!-- Settings -->
        <div class="neu-card" style="margin-bottom:24px;padding:16px 24px;">
            <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                <span style="font-weight:600;font-size:14px;color:var(--text-light);">⚙️ Settings:</span>
                <label style="font-size:13px;display:flex;align-items:center;gap:6px;">
                    Response Hours:
                    <input type="number" class="neu-input" id="responseHours" value="2" min="1" max="72"
                        style="width:70px;padding:8px;">
                </label>
                <label style="font-size:13px;display:flex;align-items:center;gap:6px;">
                    Confidence Threshold (%):
                    <input type="number" class="neu-input" id="confThreshold" value="60" min="0" max="100" step="1"
                        style="width:80px;padding:8px;">
                </label>
                <button class="neu-btn primary" onclick="saveSettings()"
                    style="padding:8px 16px;font-size:13px;">Save</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all')" id="tabAll">All Tickets</button>
            <button class="tab-btn" onclick="switchTab('pending')" id="tabPending">⚠️ Pending Admin</button>
            <button class="tab-btn" onclick="switchTab('ai')" id="tabAi">🤖 AI Answered</button>
            <button class="tab-btn" onclick="switchTab('admin')" id="tabAdmin">✅ Admin Answered</button>
        </div>

        <!-- Ticket List -->
        <div class="ticket-list" id="ticketList">
            <div class="neu-card" style="text-align:center;padding:40px;">
                <p style="color:var(--text-light);">No tickets yet. Submit from the <a href="/"
                        style="color:var(--primary);">Chat page</a>.</p>
            </div>
        </div>
    </div>

    <!-- Reply Modal -->
    <div class="modal-overlay" id="replyModal">
        <div class="neu-card modal">
            <h2>📝 Reply to Ticket</h2>
            <div class="field-group">
                <label>Ticket ID</label>
                <input type="text" class="neu-input" id="modalTicketId" readonly>
            </div>
            <div class="field-group">
                <label>Subject</label>
                <input type="text" class="neu-input" id="modalSubject" readonly>
            </div>
            <div class="field-group">
                <label>Customer's Message</label>
                <div class="neu-inset" id="modalBody"
                    style="font-size:13px;line-height:1.6;max-height:150px;overflow-y:auto;"></div>
            </div>
            <div class="field-group">
                <label>AI Response (Reference)</label>
                <div class="neu-inset" id="modalAIReply"
                    style="font-size:13px;line-height:1.6;max-height:100px;overflow-y:auto;color:var(--text-light);">
                </div>
            </div>
            <div class="field-group">
                <label>Confidence</label>
                <div class="confidence-bar" id="modalConfBar"></div>
            </div>
            <div class="field-group">
                <label>Your Response (will be added to KB)</label>
                <textarea class="neu-input" id="modalAdminReply" placeholder="Type your response here..."
                    rows="4"></textarea>
            </div>
            <div class="actions">
                <button class="neu-btn" onclick="closeModal()">Cancel</button>
                <button class="neu-btn success" onclick="submitReply()" id="submitReplyBtn">✅ Send & Add to KB</button>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        let allTickets = [];
        let currentTab = 'all';

        // ── Auth Check ──
        if (!localStorage.getItem('adminToken')) {
            window.location.href = '/login';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/login';
        }

        // ── Dark mode ──
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        // ── Helpers ──
        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function getConfClass(p) { return p >= 60 ? 'conf-high' : p >= 30 ? 'conf-med' : 'conf-low'; }
        function getConfColor(p) { return p >= 60 ? 'var(--success)' : p >= 30 ? 'var(--warning)' : 'var(--danger)'; }

        function confBarHTML(pct) {
            return `<div class="confidence-bar">
        <span style="font-size:11px;color:var(--text-light);">Confidence:</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${getConfColor(pct)};"></div></div>
        <span class="bar-label" style="color:${getConfColor(pct)};">${pct}%</span>
      </div>`;
        }

        function statLabelHTML(key, value, badgeClass) {
            return `<div class="stat-label-row">
        <span class="label-key">${key}:</span>
        <span class="badge ${badgeClass || ''}">${value}</span>
      </div>`;
        }

        function kbCitationHTML(sources) {
            if (!sources || sources.length === 0) return '';
            return sources.map(s => `
                <div class="kb-citation">
                    <div class="kb-citation-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        Source: ${escHtml(s.source || s.title)} (Score: ${s.score})
                    </div>
                    <div class="kb-citation-snippet">"${escHtml(s.snippet)}"</div>
                </div>
            `).join('');
        }

        // ── Load Stats ──
        async function loadStats() {
            try {
                const res = await fetch(`${API}/api/admin/stats`);
                const d = await res.json();
                document.getElementById('statTotal').textContent = d.total_tickets;
                document.getElementById('statAI').textContent = d.ai_answered;
                document.getElementById('statPending').textContent = d.pending_admin;
                document.getElementById('statAdmin').textContent = d.admin_answered;
                document.getElementById('statKB').textContent = d.kb_articles;
                document.getElementById('responseHours').value = d.response_hours;
                document.getElementById('confThreshold').value = d.confidence_threshold;

                // Queue stats
                let qHTML = '';
                for (const [q, n] of Object.entries(d.queues || {})) {
                    qHTML += statLabelHTML(q, n, 'ai');
                }
                document.getElementById('queueStats').innerHTML = qHTML || '<span style="color:var(--text-light);font-size:13px;">No data yet</span>';

                // Priority stats
                let pHTML = '';
                for (const [p, n] of Object.entries(d.priorities || {})) {
                    pHTML += statLabelHTML('Priority', `${p} (${n})`, p);
                }
                document.getElementById('priorityStats').innerHTML = pHTML || '<span style="color:var(--text-light);font-size:13px;">No data yet</span>';
            } catch (e) { console.error(e); }
        }

        // ── Load Tickets ──
        async function loadTickets() {
            try {
                const res = await fetch(`${API}/api/admin/tickets`);
                const d = await res.json();
                allTickets = d.tickets || [];
                renderTickets();
            } catch (e) { console.error(e); }
        }

        // ── Render Tickets ──
        function renderTickets() {
            const list = document.getElementById('ticketList');
            let filtered = allTickets;
            if (currentTab === 'pending') filtered = allTickets.filter(t => t.status === 'pending_admin');
            else if (currentTab === 'ai') filtered = allTickets.filter(t => t.status === 'answered_by_ai');
            else if (currentTab === 'admin') filtered = allTickets.filter(t => t.status === 'answered_by_admin');

            if (!filtered.length) {
                list.innerHTML = `<div class="neu-card" style="text-align:center;padding:40px;">
          <p style="color:var(--text-light);">No tickets in this category.</p></div>`;
                return;
            }

            list.innerHTML = filtered.map(t => {
                const conf = t.confidence_score != null ? t.confidence_score : 0;
                const canReply = t.status === 'pending_admin';
                return `
        <div class="neu-card ticket-item" ${canReply ? `onclick="openModal('${t.ticket_id}')"` : ''}
             style="${canReply ? 'cursor:pointer;' : 'cursor:default;'}">
          <div class="ticket-header">
            <span class="ticket-subject">${escHtml(t.subject)}</span>
            <div style="display:flex;gap:6px;align-items:center;">
              <span class="badge ${t.priority}">Priority: ${t.priority}</span>
              <span class="badge ${t.status === 'pending_admin' ? 'pending' : t.status === 'answered_by_admin' ? 'admin' : 'ai'}">
                ${t.status === 'pending_admin' ? '⚠️ Pending' : t.status === 'answered_by_admin' ? '✅ Admin' : '🤖 AI'}
              </span>
            </div>
          </div>
          <div class="ticket-body">${escHtml(t.body).substring(0, 200)}${t.body.length > 200 ? '...' : ''}</div>
          <div class="ticket-footer">
            <div class="ticket-meta">
              <span class="badge ai">Queue: ${t.queue}</span>
              <span class="badge" style="background:rgba(59,130,246,0.1);color:var(--primary);">Type: ${t.ticket_type}</span>
            </div>
            <span style="font-size:12px;color:var(--text-light);">🕐 ${t.created_at}</span>
          </div>
          <div style="margin-top:10px;">
            ${confBarHTML(conf)}
          </div>
          <div id="citations-${t.ticket_id}" style="margin-top:8px;">
            ${kbCitationHTML(t.kb_sources)}
          </div>
          ${t.status === 'answered_by_admin' ? `
            <div class="neu-inset" style="margin-top:16px; border-left: 4px solid var(--success); background: linear-gradient(to right, rgba(16,185,129,0.05), transparent);">
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px; color:var(--success); font-weight:700; font-size:14px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                Admin Official Response
              </div>
              <div style="font-size:14px; line-height:1.6; color:var(--text);">${escHtml(t.admin_reply)}</div>
              <div style="font-size:11px; color:var(--text-light); margin-top:8px; text-align:right; opacity:0.7;">Resolved at: ${t.resolved_at || t.created_at}</div>
            </div>`: ''}
          ${canReply ? `
            <div style="margin-top:12px;text-align:right;">
              <button class="neu-btn primary" style="padding:8px 16px;font-size:12px;" onclick="event.stopPropagation();openModal('${t.ticket_id}')">
                ✍️ Reply
              </button>
            </div>`: ''}
        </div>`;
            }).join('');
        }

        // ── Tabs ──
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const id = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
            document.getElementById(id).classList.add('active');
            renderTickets();
        }

        // ── Modal ──
        function openModal(ticketId) {
            const t = allTickets.find(x => x.ticket_id === ticketId);
            if (!t) return;
            document.getElementById('modalTicketId').value = t.ticket_id;
            document.getElementById('modalSubject').value = t.subject;
            document.getElementById('modalBody').textContent = t.body;
            document.getElementById('modalAIReply').textContent = t.ai_reply;
            document.getElementById('modalConfBar').innerHTML = confBarHTML(t.confidence_score || 0);
            document.getElementById('modalAdminReply').value = '';
            document.getElementById('replyModal').classList.add('active');
        }
        function closeModal() { document.getElementById('replyModal').classList.remove('active'); }

        // ── Submit Reply ──
        async function submitReply() {
            const ticketId = document.getElementById('modalTicketId').value;
            const reply = document.getElementById('modalAdminReply').value.trim();
            if (!reply) { alert('Please type a response.'); return; }
            document.getElementById('submitReplyBtn').disabled = true;
            document.getElementById('submitReplyBtn').textContent = 'Sending...';
            try {
                const res = await fetch(`${API}/api/admin/reply`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ticket_id: ticketId, admin_reply: reply }) });
                const d = await res.json();
                if (d.success) { closeModal(); loadStats(); loadTickets(); }
                else alert('Error: ' + (d.error || 'Unknown'));
            } catch (e) { alert('Network error'); }
            document.getElementById('submitReplyBtn').disabled = false;
            document.getElementById('submitReplyBtn').textContent = '✅ Send & Add to KB';
        }

        // ── Save Settings ──
        async function saveSettings() {
            const h = parseInt(document.getElementById('responseHours').value);
            const t = parseFloat(document.getElementById('confThreshold').value);
            try {
                await fetch(`${API}/api/admin/settings`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ response_hours: h, confidence_threshold: t }) });
                loadStats();
            } catch (e) { alert('Failed to save settings'); }
        }

        // ── Init & auto-refresh ──
        loadStats(); loadTickets();
        setInterval(() => { loadStats(); loadTickets(); }, 5000);
    </script>
</body>

</html>
