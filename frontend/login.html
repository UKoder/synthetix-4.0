<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Support Triage</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">

    <!-- Dark Mode Toggle (Top Right) -->
    <button class="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode"
        style="position:absolute; top:24px; right:24px;"></button>

    <div class="neu-card" style="width:100%; max-width:400px; text-align:center;">
        <div style="font-size:32px; margin-bottom:16px;">🔐</div>
        <h2 style="color:var(--text); font-size:24px; font-weight:800; margin-bottom:8px;">Admin Login</h2>
        <p style="color:var(--text-light); font-size:15px; margin-bottom:32px;">Please authenticate to access the
            dashboard.</p>

        <form id="loginForm" onsubmit="event.preventDefault(); initiateLogin();">
            <div style="margin-bottom:20px; text-align:left;">
                <label
                    style="display:block; font-size:14px; font-weight:700; color:var(--text-light); margin-bottom:8px;">Username</label>
                <input type="text" class="neu-input" id="username" placeholder="Enter username" required>
            </div>

            <div style="margin-bottom:32px; text-align:left;">
                <label
                    style="display:block; font-size:14px; font-weight:700; color:var(--text-light); margin-bottom:8px;">Password</label>
                <input type="password" class="neu-input" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="neu-btn primary" style="width:100%; padding:16px 20px; font-size:16px;">
                Login
            </button>
        </form>

        <div class="neu-inset" style="margin-top:32px; font-size:13px; color:var(--text-light);">
            <strong>Demo Credentials:</strong><br>
            Username: <code>admin124</code><br>
            Password: <code>admin</code>
        </div>
    </div>

    <!-- Error Toast -->
    <div id="errorToast" class="neu-card"
        style="display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--danger); color:white; padding:16px 24px; z-index:1000; box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4);">
        Invalid username or password.
    </div>

    <script>
        // ── Dark mode ──
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }
        if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');

        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            window.location.href = '/admin';
        }

        async function initiateLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if (data.success && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin';
                } else {
                    showError();
                }
            } catch (err) {
                showError();
            }
        }

        function showError() {
            const toast = document.getElementById('errorToast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
    </script>
</body>

</html>
